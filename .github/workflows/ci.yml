name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate shell script syntax
        run: make lint

      - name: Build docker image
        run: docker build -t imapfilter:test .

      - name: Smoke test container startup behavior
        run: |
          set -eu
          output_file="$(mktemp)"
          set +e
          docker run --rm imapfilter:test >"${output_file}" 2>&1
          rc=$?
          set -e
          test "${rc}" -eq 1
          grep -q 'Config not found' "${output_file}"
          rm -f "${output_file}"
